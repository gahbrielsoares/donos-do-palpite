<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donos do Palpite - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background-color: #e31d1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo-area h1 {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo-area p {
            font-size: 13px;
            opacity: 0.85;
            margin-top: 5px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px 25px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #999;
            font-size: 14px;
            transition: 0.2s;
        }

        .tab.active {
            color: #e31d1a;
            border-bottom: 3px solid #e31d1a;
            margin-bottom: -2px;
        }

        .form-section { display: none; }
        .form-section.active { display: block; }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus {
            border-color: #e31d1a;
        }

        .btn-primary {
            width: 100%;
            background-color: #e31d1a;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            transition: 0.2s;
        }

        .btn-primary:hover { background-color: #c0150f; }

        .forgot {
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            color: #999;
        }

        .forgot a { color: #e31d1a; text-decoration: none; }

        .divider {
            text-align: center;
            color: #ccc;
            font-size: 12px;
            margin: 15px 0;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #eee;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .error-msg {
            background: #ffe0e0;
            color: #c0150f;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }

        .success-msg {
            background: #e0ffe0;
            color: #1a7c1a;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }

        footer-text {
            color: white;
            font-size: 11px;
            margin-top: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="logo-area">
    <h1>🏆 Donos do Palpite</h1>
    <p>Faça seu palpite e ganhe!</p>
</div>

<div class="card">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Entrar</div>
        <div class="tab" onclick="switchTab('cadastro')">Cadastrar</div>
    </div>

    <!-- LOGIN -->
    <div class="form-section active" id="tab-login">
        <div class="error-msg" id="login-error"></div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="login-email" placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="login-senha" placeholder="••••••••">
        </div>
        <button class="btn-primary" onclick="doLogin()">Entrar</button>
        <div class="forgot"><a href="#">Esqueci minha senha</a></div>
    </div>

    <!-- CADASTRO -->
    <div class="form-section" id="tab-cadastro">
        <div class="error-msg" id="cadastro-error"></div>
        <div class="success-msg" id="cadastro-success"></div>
        <div class="form-group">
            <label>Nome completo</label>
            <input type="text" id="cad-nome" placeholder="Seu nome">
        </div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="cad-email" placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label>WhatsApp / Telefone</label>
            <input type="tel" id="cad-telefone" placeholder="(11) 99999-9999">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group">
            <label>Confirmar Senha</label>
            <input type="password" id="cad-senha2" placeholder="Repita a senha">
        </div>
        <button class="btn-primary" onclick="doRegister()">Criar conta</button>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelector(`#tab-${tab}`).classList.add('active');
        event.target.classList.add('active');
    }

    function doLogin() {
        const email = document.getElementById('login-email').value.trim();
        const senha = document.getElementById('login-senha').value;
        const errEl = document.getElementById('login-error');

        if (!email || !senha) {
            errEl.innerText = 'Preencha todos os campos.';
            errEl.style.display = 'block';
            return;
        }

        // Verifica se é admin
        if (email === 'admin@donosdopalpite.com' && senha === 'admin123') {
            window.location.href = 'admin.html';
            return;
        }

        // Busca usuários salvos
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const user = users.find(u => u.email === email && u.senha === senha);

        if (user) {
            localStorage.setItem('currentUser', JSON.stringify(user));
            window.location.href = 'index.html';
        } else {
            errEl.innerText = 'E-mail ou senha incorretos.';
            errEl.style.display = 'block';
        }
    }

    function doRegister() {
        const nome = document.getElementById('cad-nome').value.trim();
        const email = document.getElementById('cad-email').value.trim();
        const telefone = document.getElementById('cad-telefone').value.trim();
        const senha = document.getElementById('cad-senha').value;
        const senha2 = document.getElementById('cad-senha2').value;
        const errEl = document.getElementById('cadastro-error');
        const sucEl = document.getElementById('cadastro-success');

        errEl.style.display = 'none';
        sucEl.style.display = 'none';

        if (!nome || !email || !telefone || !senha || !senha2) {
            errEl.innerText = 'Preencha todos os campos.';
            errEl.style.display = 'block';
            return;
        }

        if (senha.length < 6) {
            errEl.innerText = 'A senha deve ter pelo menos 6 caracteres.';
            errEl.style.display = 'block';
            return;
        }

        if (senha !== senha2) {
            errEl.innerText = 'As senhas não coincidem.';
            errEl.style.display = 'block';
            return;
        }

        const users = JSON.parse(localStorage.getItem('users') || '[]');

        if (users.find(u => u.email === email)) {
            errEl.innerText = 'Este e-mail já está cadastrado.';
            errEl.style.display = 'block';
            return;
        }

        const newUser = { nome, email, telefone, senha, id: Date.now() };
        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('currentUser', JSON.stringify(newUser));

        sucEl.innerText = '✅ Conta criada! Redirecionando...';
        sucEl.style.display = 'block';

        setTimeout(() => window.location.href = 'index.html', 1500);
    }

    // Verifica se já está logado
    window.onload = () => {
        const user = localStorage.getItem('currentUser');
        if (user) window.location.href = 'index.html';
    };
</script>

</body>
</html>
