<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pagamento - Donos do Palpite</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#0b0b0b; color:#fff; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 18px; }
    .card { background:#141414; border:1px solid #2a2a2a; border-radius:12px; padding:16px; }
    label { display:block; font-size: 14px; margin: 10px 0 6px; color:#cfcfcf; }
    input { width:100%; padding:12px; border-radius:10px; border:1px solid #333; background:#0f0f0f; color:#fff; }
    button { padding:12px 14px; border-radius:10px; border:0; cursor:pointer; font-weight:700; }
    .btn { background:#e41d2d; color:#fff; width:100%; margin-top:12px; }
    .muted { color:#bdbdbd; font-size: 13px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .err { background:#3a0f12; border:1px solid #7a1e24; padding:10px; border-radius:10px; margin-top:12px; color:#ffb3b3; }
    .ok { background:#0f2d1a; border:1px solid #1f6a3a; padding:10px; border-radius:10px; margin-top:12px; color:#bfffd6; }
    img.qr { width: 260px; height: 260px; background:#fff; padding:10px; border-radius:12px; }
    .pixBox { display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start; margin-top:14px; }
    .codeBox { flex:1; min-width:260px; }
    textarea { width:100%; min-height:120px; border-radius:10px; border:1px solid #333; background:#0f0f0f; color:#fff; padding:12px; }
    .btn2 { background:#2d7dff; color:#fff; width:100%; margin-top:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Pagamento (PIX)</h2>

    <div class="card">
      <div id="summary" class="muted"></div>

      <h3 style="margin-top:14px;">Identificação do apostador</h3>
      <div class="row">
        <div>
          <label>Nome completo</label>
          <input id="name" placeholder="Ex: Gabriel José da Silva" />
        </div>
        <div>
          <label>WhatsApp (DDD + número)</label>
          <input id="phone" placeholder="Ex: (11) 91234-5678" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>E-mail</label>
          <input id="email" placeholder="exemplo@email.com" />
        </div>
        <div>
          <label>CPF</label>
          <input id="cpf" placeholder="000.000.000-00" />
        </div>
      </div>

      <button class="btn" id="btnPix">Gerar PIX</button>
      <div id="msg"></div>

      <div id="pixResult" style="display:none;">
        <div class="pixBox">
          <div>
            <div class="muted" style="margin-bottom:8px;">Escaneie o QR Code:</div>
            <img id="qrImg" class="qr" alt="QR Code PIX"/>
          </div>
          <div class="codeBox">
            <div class="muted" style="margin-bottom:8px;">PIX copia e cola:</div>
            <textarea id="pixCopy" readonly></textarea>
            <button class="btn2" id="btnCopy">Copiar código PIX</button>
            <div class="muted" id="ticketWrap" style="margin-top:8px;"></div>
          </div>
        </div>
        <div class="ok">Após o pagamento, você pode fechar esta tela. Nós confirmaremos sua aposta no painel.</div>
      </div>
    </div>
  </div>

  <script>
    function moneyBRL(v) {
      try { return v.toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
      catch { return 'R$ ' + String(v); }
    }

    function getCart() {
      return JSON.parse(localStorage.getItem('cart') || '[]');
    }

    function getTotalFromCart() {
      const cart = getCart();
      return cart.reduce((sum, item) => sum + (Number(item.price || item.totalValue || item.value || 0)), 0);
    }

    function setMsg(type, text) {
      const msg = document.getElementById('msg');
      msg.innerHTML = '<div class="'+(type==='err'?'err':'ok')+'">'+text+'</div>';
    }

    function sanitizeCpf(cpf) { return String(cpf || '').replace(/\D/g, ''); }

    function buildBetPayload() {
      const cart = getCart();
      // Você pode mandar o espelho do carrinho; mantenha tamanho moderado.
      return {
        id: 'bet_' + Date.now(),
        games: cart
      };
    }

    async function createPixPayment() {
      const amount = getTotalFromCart();
      if (!amount || amount <= 0) {
        setMsg('err', 'Carrinho vazio. Volte e adicione uma aposta.');
        return;
      }

      const payer = {
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        cpf: sanitizeCpf(document.getElementById('cpf').value.trim())
      };

      if (!payer.name || !payer.phone || !payer.email || !payer.cpf) {
        setMsg('err', 'Preencha Nome, WhatsApp, E-mail e CPF.');
        return;
      }

      const bet = buildBetPayload();

      const btn = document.getElementById('btnPix');
      btn.disabled = true;
      btn.textContent = 'Gerando PIX...';

      try {
        const res = await fetch('/.netlify/functions/mp-create-pix', {
          method: 'POST',
          headers: { 'Content-Type':'application/json' },
          body: JSON.stringify({ amount: Number(amount.toFixed(2)), payer, bet })
        });

        const text = await res.text();
        let data = null;
        try { data = JSON.parse(text); } catch { /* ignore */ }

        if (!res.ok || !data || !data.ok) {
          const detail = data?.error || (text ? text.substring(0, 300) : 'Sem resposta da função');
          throw new Error(detail);
        }

        // Salvar “registro” local para o admin (até você ter webhook + DB)
        const betRecord = {
          betId: data.external_reference,
          mpPaymentId: data.mp_payment_id,
          status: data.status,
          createdAt: new Date().toISOString(),
          payer,
          cart: getCart(),
          total: amount
        };
        const all = JSON.parse(localStorage.getItem('admin_bets') || '[]');
        all.unshift(betRecord);
        localStorage.setItem('admin_bets', JSON.stringify(all));

        // UI
        document.getElementById('pixResult').style.display = 'block';
        document.getElementById('qrImg').src = 'data:image/png;base64,' + data.pix.qr_code_base64;
        document.getElementById('pixCopy').value = data.pix.qr_code;

        const ticketWrap = document.getElementById('ticketWrap');
        if (data.pix.ticket_url) {
          ticketWrap.innerHTML = 'Se preferir, abra o link: <a href="'+data.pix.ticket_url+'" target="_blank" rel="noopener" style="color:#7fb2ff;">ticket PIX</a>';
        } else {
          ticketWrap.textContent = '';
        }

        setMsg('ok', 'PIX gerado com sucesso.');
      } catch (e) {
        setMsg('err', 'Falha ao gerar PIX: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Gerar PIX';
      }
    }

    document.getElementById('btnPix').addEventListener('click', createPixPayment);
    document.getElementById('btnCopy').addEventListener('click', async () => {
      const code = document.getElementById('pixCopy').value;
      try {
        await navigator.clipboard.writeText(code);
        setMsg('ok', 'Código PIX copiado!');
      } catch {
        setMsg('err', 'Não consegui copiar automaticamente. Selecione e copie manualmente.');
      }
    });

    // summary
    const total = getTotalFromCart();
    document.getElementById('summary').textContent = 'Total do carrinho: ' + moneyBRL(total);
  </script>
</body>
</html>
